<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Gimnasio</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="icon" href="../assets/favicon/favicon_logo.png" type="image/png">
</head>

<body>

    <div class="login-container">

        <h1>Registro</h1>

        <form id="registerForm">

            <input type="text" id="nombre" placeholder="Nombre completo" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Contraseña" required>

            <button type="submit">Crear Cuenta</button>

        </form>

        <p id="mensaje"></p>
        <div id="spinner" style="display:none;margin-top:8px;">Cargando...</div>
        <p style="margin-top:12px;"><a href="login.html">Volver al login</a></p>

    </div>

    <script src="../js/register.js"></script>

</body>

</html>
