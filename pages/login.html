<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gimnasio</title>

    <link rel="stylesheet" href="../css/login.css">
    <link rel="icon" href="../assets/favicon/favicon_logo.png" type="image/png">
</head>

<body>

    <div class="login-container">

        <h1>GIMNASIO FIT</h1>
        <h2>Iniciar Sesión</h2>

        <form id="loginForm">

            <input type="email" id="email" placeholder="Ingrese su email" required>

            <input type="password" id="password" placeholder="Ingrese su contraseña" required>

            <button type="submit">
                Ingresar
            </button>

        </form>

        <p id="mensaje"></p>
        <div id="spinner" style="display:none;margin-top:8px;">Cargando...</div>
        <p style="margin-top:12px;">¿No tenés cuenta? <a href="register.html">Registrate</a></p>

    </div>

    <script src="../js/login.js"></script>

</body>

</html>
